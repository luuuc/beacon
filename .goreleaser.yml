# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

# Minimal GoReleaser config — cross-compiles the beacon binary for four
# platforms, archives as tar.gz, and uploads to the GitHub Release.
# No Homebrew, no Scoop, no Snapcraft. The install script covers install.

version: 2

builds:
  - id: beacon
    main: ./cmd/beacon
    binary: beacon
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/luuuc/beacon/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: beacon
    ids: [beacon]
    formats: [tar.gz]
    name_template: "beacon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "beacon_{{ .Version }}_checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"

release:
  github:
    owner: luuuc
    name: beacon
  prerelease: auto
  make_latest: true
