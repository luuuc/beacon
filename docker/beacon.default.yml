# Default Beacon config baked into the ghcr.io/luuuc/beacon image.
#
# Every field here is overridable via BEACON_* environment variables at
# runtime, which always win over this file. The defaults are chosen so
# that `docker run -p 127.0.0.1:4680:4680 -e BEACON_AUTH_TOKEN=…` gives
# you a working SQLite-backed Beacon with no further configuration.
#
# If you want Postgres, set BEACON_DATABASE_URL (and optionally
# BEACON_DATABASE_SCHEMA) and Beacon will ignore the sqlite block below.

server:
  # 0.0.0.0 so `docker run -p` can forward to the container. The loopback
  # guard is enforced by Validate() — it refuses to start here unless
  # BEACON_AUTH_TOKEN is set, which is the intended fail-fast behavior.
  bind: 0.0.0.0
  http_port: 4680
  mcp_port: 4681

database:
  # Pure-Go SQLite on the mounted volume. Declared here so resolveKind()
  # picks the sqlite adapter; BEACON_DATABASE_URL will override for
  # Postgres deployments.
  adapter: sqlite
  path: /var/lib/beacon/beacon.db

retention:
  events_days: 14
  rollups_hour_days: 90

rollup:
  tick_seconds: 60
  prune_at: "03:00"
  timezone: "UTC"

baseline:
  windows: ["24h", "7d", "30d"]
